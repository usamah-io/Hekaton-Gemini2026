<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Left Blue Dot -->
  <circle cx="25" cy="50" r="12" fill="#4285F4" />
  
  <!-- Right 4-Color Bar with Rounded Outer Edges -->
  <g clip-path="url(#bar-clip)">
    <rect x="47" y="38" width="12" height="24" fill="#4285F4" />
    <rect x="59" y="38" width="12" height="24" fill="#0F9D58" />
    <rect x="71" y="38" width="12" height="24" fill="#F4B400" />
    <rect x="83" y="38" width="12" height="24" fill="#DB4437" />
  </g>

  <defs>
    <!-- Rounded Rectangle Clip Path for the Entire Bar -->
    <clipPath id="bar-clip">
      <rect x="47" y="38" width="48" height="24" rx="4" ry="4" />
    </clipPath>
  </defs>
</svg>
